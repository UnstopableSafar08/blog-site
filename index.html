        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/monokai-sublime.min.css">

    <!-- ========== Google Identity Services ========== -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        window.currentGoogleUser = null;
        window.handleGoogleLogin = (response) => {
            try {
                const token = response.credential;
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                window.currentGoogleUser = JSON.parse(jsonPayload);
                window.dispatchEvent(new Event('hashchange'));
            } catch(e) { console.error("Google Auth Error", e); }
        };
    </script>

    <!-- Optional: Local configuration override for development (git-ignored) -->
    <script src="config.local.js"></script>

    <script src="assets/js/core.js"></script>
    <script src="assets/js/comments.js"></script>
    <script>


        // ==========================================
        // MODULE 5: UI — Templates & DOM Rendering
        // ==========================================
        const UI = (() => {
            const app = document.getElementById('app');
            const toastContainer = document.getElementById('toast-container');
            const modalOverlay = document.getElementById('modal-overlay');
            const modalBox = document.getElementById('modal-box');

            // -- Utility Helpers --
            function formatDate(dateStr) {
                if (!dateStr) return '';
                // Handle SQLite datetime format: "2024-01-15 10:30:00"
                // Convert to ISO format: "2024-01-15T10:30:00"
                let isoStr = dateStr;
                if (dateStr.includes(' ') && !dateStr.includes('T')) {
                    isoStr = dateStr.replace(' ', 'T');
                }
                const d = new Date(isoStr);
                if (isNaN(d.getTime())) return 'Invalid Date';
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }
            function readTime(html) {
                const text = html ? html.replace(/<[^>]*>/g, '') : '';
                const words = text.split(/\s+/).filter(Boolean).length;
                return Math.max(1, Math.ceil(words / 200));
            }
            function escapeHtml(str) {
                const d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }
            function truncate(str, max = 30) {
                if (!str) return '';
                return str.length > max ? str.substring(0, max) + '...' : str;
            }
            function categoryClass(cat) {
                const map = { Technology: 'tech', Design: 'design', Lifestyle: 'lifestyle', Business: 'business' };
                return map[cat] || 'general';
            }
            function coverUrl(img, i) {
                if (img) return img;
                return 'assets/img/fallback-image.png';
            }

            // -- Toast Notifications --
            function showToast(msg, type = 'info', duration = 4000) {
                const iconMap = { success: Icons.check, error: Icons.alertCircle, warning: Icons.alertCircle, info: Icons.info };
                const el = document.createElement('div');
                el.className = `toast ${type}`;
                el.innerHTML = `${iconMap[type] || Icons.info}<span>${escapeHtml(msg)}</span>`;
                toastContainer.appendChild(el);
                setTimeout(() => { el.classList.add('removing'); setTimeout(() => el.remove(), 300); }, duration);
            }

            // -- Modal --
            function showModal(title, message, actions = []) {
                let actionsHtml = actions.map(a =>
                    `<button class="btn ${a.class || 'btn-secondary'}" onclick="${a.onclick}">${a.label}</button>`
                ).join('');
                modalBox.innerHTML = `
                <button class="modal-close" onclick="UI.closeModal()">${Icons.x}</button>
                <h3>${escapeHtml(title)}</h3>
                <div class="modal-body" style="margin-bottom:24px">${message}</div>
                <div class="modal-actions">${actionsHtml}</div>`;
                modalOverlay.classList.add('visible');
            }
            function closeModal(e) {
                if (e && e.target && e.target !== modalOverlay) return;
                modalOverlay.classList.remove('visible');
            }

            // -- Loaders --
            function showSkeleton(type = 'grid') {
                if (type === 'grid') {
                    app.innerHTML = `
                    <div class="container page-padding page-enter">
                        <div class="skel-featured skeleton" style="height:320px;margin-bottom:40px;border-radius:var(--radius-lg)"></div>
                        <div class="post-grid">
                            ${Array(6).fill(`<div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skel-line w60 skeleton"></div><div class="skel-title skeleton"></div><div class="skel-line w80 skeleton"></div><div class="skel-line w40 skeleton"></div></div></div>`).join('')}
                        </div>
                    </div>`;
                } else if (type === 'post') {
                    app.innerHTML = `
                    <div class="post-view page-enter" style="padding:0 24px">
                        <div class="post-header"><div class="skeleton" style="width:100px;height:24px;margin:0 auto 16px;border-radius:99px"></div><div class="skeleton" style="width:70%;height:40px;margin:0 auto 20px;border-radius:8px"></div><div class="skeleton" style="width:40%;height:16px;margin:0 auto;border-radius:8px"></div></div>
                        <div class="skeleton" style="width:100%;height:360px;border-radius:var(--radius-lg);margin-bottom:48px"></div>
                        <div style="display:flex;flex-direction:column;gap:14px">${Array(8).fill(`<div class="skeleton" style="height:16px;border-radius:6px"></div>`).join('')}<div class="skeleton" style="height:16px;width:60%;border-radius:6px"></div></div>
                    </div>`;
                } else if (type === 'table') {
                    app.innerHTML = `
                    <div class="page-enter">
                        <div class="stats-grid" style="margin-bottom:32px">${Array(3).fill(`<div class="skeleton" style="height:110px;border-radius:var(--radius-md)"></div>`).join('')}</div>
                        <div class="skeleton" style="height:400px;border-radius:var(--radius-md)"></div>
                    </div>`;
                }
            }

            // -- Page: Home --
            function renderHomePage(posts, page, totalPages, query, category) {
                const published = posts;
                let featured = '';
                let gridPosts = published;

                if (page === 1 && !query && !category && published.length > 0) {
                    const fp = published[0];
                    featured = `
                    <div class="featured-post">
                        <div class="fp-image" style="background-image:url('${coverUrl(fp.cover_image, fp.id)}')"></div>
                        <div class="fp-content">
                            <span class="badge badge-${categoryClass(fp.category)}">${escapeHtml(fp.category)}</span>
                            <h2><a href="#post/${fp.slug}" title="${escapeHtml(fp.title)}">${escapeHtml(truncate(fp.title, 30))}</a></h2>
                            <p>${escapeHtml(fp.excerpt || '')}</p>
                            <div class="fp-meta">
                                <span>${Icons.calendar} ${formatDate(fp.created_at)}</span>
                                <span>${Icons.clock} ${readTime(fp.content)} min read</span>
                                <span>${Icons.eye} ${fp.views || 0}</span>
                            </div>
                        </div>
                    </div>`;
                    gridPosts = published.slice(1);
                }

                const cards = gridPosts.map((p, i) => `
                <article class="post-card" data-aos="fade-up" data-aos-delay="${i * 100}">
                    <div class="card-image" style="background-image:url('${coverUrl(p.cover_image, p.id)}')">
                        <span class="badge badge-${categoryClass(p.category)}">${escapeHtml(p.category)}</span>
                    </div>
                    <div class="card-body">
                        <h3><a href="#post/${p.slug}" title="${escapeHtml(p.title)}">${escapeHtml(truncate(p.title, 30))}</a></h3>
                        <p class="excerpt">${escapeHtml(p.excerpt || '')}</p>
                        <div class="card-meta">
                            <span>${Icons.calendar} ${formatDate(p.created_at)}</span>
                            <span>${Icons.clock} ${readTime(p.content)} min</span>
                            <span>${Icons.eye} ${p.views || 0}</span>
                        </div>
                    </div>
                </article>`).join('');

                const categories = ['All', 'Technology', 'Design', 'Lifestyle', 'Business', 'General'];
                const catFilter = categories.map(c =>
                    `<button class="btn btn-sm ${(c === 'All' && !category) || c === category ? 'btn-primary' : 'btn-secondary'}" onclick="App.filterCategory('${c === 'All' ? '' : c}')">${c}</button>`
                ).join('');

                const emptyState = published.length === 0 ? `
                <div class="empty-state">
                    ${Icons.inbox}
                    <h3>${query || category ? 'No posts found' : 'No posts yet'}</h3>
                    <p>${query || category ? 'Try adjusting your search or filter.' : 'When posts are published, they will appear here.'}</p>
                </div>` : '';

                app.innerHTML = `
                <section class="hero" data-aos="fade-down">
                    <h1 data-aos="fade-up" data-aos-delay="100">Sagar's Blogs</h1>
                    <p data-aos="fade-up" data-aos-delay="200">Thoughts, stories & ideas — powered by a serverless edge database.</p>
                    ${Auth.isAuthenticated() ? `<a href="#admin/dashboard" class="hero-cta">${Icons.edit} Start Writing</a>` : ''}
                </section>
                <div class="container" style="padding:48px 24px 80px">
                    <div class="section-title">
                        <h2>Latest Posts</h2>
                        <div class="search-box">
                            ${Icons.search}
                            <input type="text" id="search-input" class="${query ? 'has-value' : ''}" placeholder="Search posts..." value="${escapeHtml(query || '')}" oninput="App.onSearch(this.value)">
                            <button class="search-clear" onclick="App.clearHomeSearch()" title="Clear search">${Icons.x}</button>
                        </div>
                    </div>
                    <div class="filter-bar mb-8" style="display:flex;gap:8px;flex-wrap:wrap">${catFilter}</div>
                    ${featured}
                    ${emptyState || `<div class="post-grid">${cards}</div>`}
                    ${renderPagination(page, totalPages, 'App.goToPage')}
                </div>`;
            }

            // -- Page: Single Post --
            function renderPostPage(post, prevPost, nextPost, comments = [], reactions = []) {
                const prevLink = prevPost
                    ? `<a href="#post/${prevPost.slug}">${Icons.arrowLeft}<span class="post-nav-title">${escapeHtml(prevPost.title)}</span></a>`
                    : '<span></span>';
                const nextLink = nextPost
                    ? `<a href="#post/${nextPost.slug}" style="margin-left:auto;text-align:right;flex-direction:row-reverse"><span class="post-nav-title">${escapeHtml(nextPost.title)}</span>${Icons.arrowRight}</a>`
                    : '<span></span>';

                const coverImage = post.cover_image || 'assets/img/fallback-image.png';

                app.innerHTML = `
                <article class="post-view page-enter" style="padding:0">
                    <div class="post-hero-bg" style="background-image: url('${coverImage}')">
                        <div class="post-hero-bg-overlay"></div>
                        <div class="post-hero-bg-content">
                            <a href="#home" class="post-back-link-bg">${Icons.arrowLeft} Back to Home</a>
                            <span class="badge badge-${categoryClass(post.category)}">${escapeHtml(post.category)}</span>
                            <h1 class="post-title-bg" title="${escapeHtml(post.title)}">${escapeHtml(truncate(post.title, 80))}</h1>
                            <div class="post-meta-bg">
                                <span>${Icons.calendar} ${formatDate(post.created_at)}</span>
                                <span>${Icons.clock} ${readTime(post.content)} min read</span>
                                <span>${Icons.eye} ${post.views || 0} views</span>
                                ${post.tags ? post.tags.split(',').map(t => `<span style="background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 99px; font-size: 0.8rem;">${Icons.tag} ${escapeHtml(t.trim())}</span>`).join(' ') : ''}
                            </div>
                        </div>
                    </div>
                    <div class="post-body-wrapper">
                        <div class="post-body">${post.content || '<p>No content.</p>'}</div>
                        
                        ${Comments.getCommentsHTML(comments, post, reactions)}
                        
                        <nav class="post-nav" style="margin-top: 48px">${prevLink}${nextLink}</nav>
                    </div>
                </article>
                <button id="go-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" class="btn btn-primary go-to-top-btn" title="Go to Top">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px"><path d="M18 15l-6-6-6 6"/></svg>
                </button>`;

                // Scroll to top when post loads
                window.scrollTo({ top: 0, behavior: 'instant' });

                // Add Copy Option to Code Blocks
                requestAnimationFrame(() => {
                    const postBody = document.querySelector('.post-body');
                    if (postBody) {
                        const preBlocks = postBody.querySelectorAll('pre');
                        preBlocks.forEach(pre => {
                            // Enable Highlighter before custom copy headers
                            if (window.hljs) {
                                // hljs prefers classes like language-bash. Quill tends to use data-language
                                const hlLang = pre.getAttribute('data-language');
                                if (hlLang && !pre.classList.contains('language-' + hlLang)) {
                                    pre.classList.add('language-' + hlLang);
                                }
                                hljs.highlightElement(pre);
                            }

                            const wrapper = document.createElement('div');
                            wrapper.className = 'code-block-wrapper';
                            pre.parentNode.insertBefore(wrapper, pre);
                            wrapper.appendChild(pre);

                            const header = document.createElement('div');
                            header.className = 'code-hdr';

                            // Determine language
                            let lang = '';
                            if (pre.getAttribute('data-language')) {
                                lang = pre.getAttribute('data-language');
                            } else {
                                const classMatch = Array.from(pre.classList).find(c => c.startsWith('language-') || c === 'bash' || c === 'javascript' || c === 'html' || c === 'css');
                                if (classMatch) {
                                    lang = classMatch.replace('language-', '');
                                }
                            }

                            if (lang) {
                                const langSpan = document.createElement('span');
                                langSpan.className = 'code-lang';
                                langSpan.innerText = lang;
                                header.appendChild(langSpan);
                            }

                            const copyBtn = document.createElement('button');
                            copyBtn.className = 'copy-code-btn';
                            copyBtn.innerHTML = `${Icons.copy} <span>Copy</span>`;
                            copyBtn.title = 'Copy to clipboard';

                            copyBtn.onclick = () => {
                                const codeContent = pre.innerText;
                                navigator.clipboard.writeText(codeContent).then(() => {
                                    copyBtn.innerHTML = `${Icons.check} <span>Copied</span>`;
                                    copyBtn.style.color = '#00cc00';

                                    setTimeout(() => {
                                        copyBtn.innerHTML = `${Icons.copy} <span>Copy</span>`;
                                        copyBtn.style.color = '';
                                    }, 2000);
                                });
                            };

                            header.appendChild(copyBtn);
                            wrapper.appendChild(header);
                        });
                    }
                });

                // Add scroll listener for go-to-top button visibility
                setTimeout(() => {
                    const goToTopBtn = document.getElementById('go-to-top');
                    if (goToTopBtn) {
                        const toggleVisibility = () => {
                            const scrollTop = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop;
                            if (scrollTop > 50) {
                                goToTopBtn.classList.add('visible');
                            } else {
                                goToTopBtn.classList.remove('visible');
                            }
                        };
                        window.addEventListener('scroll', toggleVisibility);
                        toggleVisibility(); // Check initial position
                    }
                }, 0);
            }

            // -- Page: Login --
            function renderLoginPage() {
                app.innerHTML = `
                <div class="auth-page page-enter" style="margin-top:var(--nav-h)">
                    <div class="form-card">
                        <h2>Welcome Back</h2>
                        <p class="form-subtitle">Sign in to access the admin dashboard.</p>
                        <form id="login-form" onsubmit="App.handleLogin(event)">
                            <div class="form-group">
                                <label>Username</label>
                                <input class="form-input" type="text" id="login-user" required autocomplete="username" placeholder="admin">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <div class="password-input-wrap">
                                    <input class="form-input" type="password" id="login-pass" required autocomplete="current-password" placeholder="Enter password">
                                    <button type="button" class="password-toggle" onclick="App.togglePasswordVisibility('login-pass', this)" title="Show password">${Icons.eye}</button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-full btn-lg" style="width:100%;margin-top:8px">Sign In</button>
                        </form>
                        <p style="text-align:center;margin-top:20px;font-size:.85rem">
                            <a href="#forgot-password">Forgot password?</a>
                        </p>
                    </div>
                </div>`;
            }

            // -- Page: Forgot Password --
            function renderForgotPasswordPage() {
                app.innerHTML = `
                <div class="auth-page page-enter" style="margin-top:var(--nav-h)">
                    <div class="form-card">
                        <h2>Reset Password</h2>
                        <p class="form-subtitle">Enter your admin username. A password reset link will be sent to the registered admin email addresses.</p>
                        <form onsubmit="App.handleForgotPassword(event)">
                            <div class="form-group">
                                <label>Username</label>
                                <input class="form-input" type="text" id="forgot-user" required placeholder="Your admin username">
                            </div>
                            <button type="submit" id="forgot-submit-btn" class="btn btn-primary w-full btn-lg" style="width:100%">Send Reset Link</button>
                        </form>
                        <div id="forgot-countdown" style="text-align:center;margin-top:12px;font-size:0.85rem;color:var(--text-tertiary);min-height:1.2em"></div>
                        <div id="reset-token-display" class="hidden" style="margin-top:20px;padding:16px;background:var(--bg-tertiary);border-radius:var(--radius-sm);word-break:break-all;font-family:var(--font-mono);font-size:.82rem"></div>
                        <p style="text-align:center;margin-top:16px;font-size:.85rem"><a href="#login">Back to login</a></p>
                    </div>
                </div>`;
            }

            // -- Page: Reset Password (with token) --
            function renderResetPasswordPage(token) {
                app.innerHTML = `
                <div class="auth-page page-enter" style="margin-top:var(--nav-h)">
                    <div class="form-card">
                        <h2>Set New Password</h2>
                        <p class="form-subtitle">Enter your new password below.</p>
                        <form onsubmit="App.handleResetPassword(event, '${escapeHtml(token)}')">
                            <div class="form-group">
                                <label>New Password</label>
                                <input class="form-input" type="password" id="reset-pass" required minlength="6" placeholder="Minimum 6 characters">
                            </div>
                            <div class="form-group">
                                <label>Confirm Password</label>
                                <input class="form-input" type="password" id="reset-pass-confirm" required placeholder="Repeat password">
                            </div>
                            <button type="submit" class="btn btn-primary w-full btn-lg" style="width:100%">Update Password</button>
                        </form>
                    </div>
                </div>`;
            }

            // -- Page: Admin Setup (Create first admin) --
            function renderSetupPage() {
                app.innerHTML = `
                <div class="auth-page page-enter" style="margin-top:var(--nav-h)">
                    <div class="form-card">
                        <div class="setup-steps"><div class="setup-step done"></div><div class="setup-step done"></div><div class="setup-step"></div></div>
                        <h2>Create Admin Account</h2>
                        <p class="form-subtitle">Set up the first administrator for your blog.</p>
                        <form onsubmit="App.handleSetup(event)">
                            <div class="form-group">
                                <label>Username</label>
                                <input class="form-input" type="text" id="setup-user" required minlength="3" placeholder="admin">

            // -- Component: Pagination --
            function renderPagination(page, totalPages, fnName) {
                if (totalPages <= 1) return '';
                let buttons = '';
                buttons += `<button ${page <= 1 ? 'disabled' : ''} onclick="${fnName}(${page - 1})">${Icons.chevLeft}</button>`;
                for (let i = 1; i <= totalPages; i++) {
                    if (totalPages > 7 && i > 2 && i < totalPages - 1 && Math.abs(i - page) > 1) {
                        if (i === 3 || i === totalPages - 2) buttons += `<button disabled>...</button>`;
                        continue;
                    }
                    buttons += `<button class="${i === page ? 'active' : ''}" onclick="${fnName}(${i})">${i}</button>`;
                }
                buttons += `<button ${page >= totalPages ? 'disabled' : ''} onclick="${fnName}(${page + 1})">${Icons.chevRight}</button>`;
                return `<div class="pagination">${buttons}</div>`;
            }

        // ==========================================
        // MODULE 6: EditorMod — Quill.js Wrapper
        // ==========================================
        const EditorMod = (() => {
            let quill = null;
            let currentMatchIndex = 0;
            let matches = [];

            /**
             * Initialize Quill WYSIWYG editor on a DOM element.
             * Uses the 'snow' theme with a curated toolbar.
             */
            function init(selector, content = '') {
                quill = new Quill(selector, {
                    theme: 'snow',
                    placeholder: 'Write your story...',
                    modules: {
                        syntax: true,
                        toolbar: {
                            container: [
                                [{ header: [1, 2, 3, false] }],
                                ['bold', 'italic', 'underline', 'strike'],
                                [{ color: [] }, { background: [] }],
                                [{ list: 'ordered' }, { list: 'bullet' }],
                                ['blockquote', 'code-block'],
                                ['link', 'image'],
                                ['find-replace'],
                                ['clean']
                            ],
                            handlers: {
                                'find-replace': function() {
                                    EditorMod.toggleFindReplace();
                                }
                            }
                        }
                    }
                });

                // CRITICAL: Set type="button" on ALL toolbar buttons so they
                // don't submit the parent <form> when clicked.
                // Also add the search icon to the custom find-replace button.
                setTimeout(() => {
                    const toolbar = quill.getModule('toolbar').container;
                    toolbar.querySelectorAll('button').forEach(btn => {
                        btn.setAttribute('type', 'button');
                    });
                    const frBtn = toolbar.querySelector('.ql-find-replace');
                    if (frBtn) frBtn.innerHTML = Icons.search;
                }, 0);

                if (content) quill.root.innerHTML = content;
            }

            let highlightedRanges = [];

            function clearHighlights() {
                highlightedRanges.forEach(range => {
                    if (quill) {
                        quill.formatText(range.index, range.length, 'background', false);
                    }
                });
                highlightedRanges = [];
            }

            function toggleFindReplace() {
                let panel = document.getElementById('quill-find-replace-panel');
                if (panel) {
                    clearHighlights();
                    panel.remove();
                    return;
                }

                panel = document.createElement('div');
                panel.id = 'quill-find-replace-panel';
                panel.className = 'find-replace-panel';
                panel.innerHTML = `
                    <div class="find-replace-row">
                        <input type="text" id="find-input" class="find-replace-input" placeholder="Find...">
                        <span role="button" id="find-next-btn" class="btn btn-secondary btn-sm" tabindex="0">Find Next</span>
                        <span role="button" id="find-all-btn" class="btn btn-secondary btn-sm" tabindex="0">Find All</span>
                        <span id="match-count" class="find-replace-count">0/0</span>
                    </div>
                    <div class="find-replace-row">
                        <input type="text" id="replace-input" class="find-replace-input" placeholder="Replace with...">
                        <span role="button" id="replace-btn" class="btn btn-primary btn-sm" tabindex="0">Replace</span>
                        <span role="button" id="replace-all-btn" class="btn btn-secondary btn-sm" tabindex="0">Replace All</span>
                        <span role="button" id="close-find-btn" class="btn-icon-sm" tabindex="0" title="Close">${Icons.x}</span>
                    </div>
                `;

                // Insert panel between toolbar and editor content
                const toolbar = quill.getModule('toolbar').container;
                toolbar.parentNode.insertBefore(panel, toolbar.nextSibling);

                // Add event listeners programmatically
                const findInput = document.getElementById('find-input');
                const replaceInput = document.getElementById('replace-input');
                const findNextBtn = document.getElementById('find-next-btn');
                const findAllBtn = document.getElementById('find-all-btn');
                const replaceBtn = document.getElementById('replace-btn');
                const replaceAllBtn = document.getElementById('replace-all-btn');
                const closeBtn = document.getElementById('close-find-btn');

                // Stop keyboard events from bubbling up to the form or editor (bubble phase).
                ['keydown', 'keyup', 'keypress'].forEach(evtType => {
                    panel.addEventListener(evtType, (e) => {
                        e.stopPropagation();
                    });
                });

                findNextBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    EditorMod.findNext();
                });
                findAllBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    EditorMod.findAll();
                });
                replaceBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    EditorMod.replace();
                });
                replaceAllBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    EditorMod.replaceAll();
                });
                closeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    EditorMod.toggleFindReplace();
                });

                findInput.focus();
                findInput.addEventListener('input', () => updateMatches(false));

                // Handle Enter key for find/replace actions
                const handleEnter = (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (e.target.id === 'find-input') EditorMod.findNext();
                        else EditorMod.replace();
                    }
                };
                findInput.addEventListener('keydown', handleEnter);
                replaceInput.addEventListener('keydown', handleEnter);
            }

            function updateMatches(shouldHighlight = false) {
                clearHighlights();
                
                const findInput = document.getElementById('find-input');
                if (!findInput) return;
                const term = findInput.value;
                const countEl = document.getElementById('match-count');
                
                if (!term) {
                    matches = [];
                    currentMatchIndex = -1;
                    if (countEl) countEl.textContent = '0/0';
                    return;
                }

                // Use plain text content for case-sensitive searching
                const text = quill.getText();
                matches = [];
                let index = 0;
                
                while ((index = text.indexOf(term, index)) !== -1) {
                    matches.push(index);
                    index += term.length;
                }

                if (matches.length > 0) {
                    if (currentMatchIndex === -1 || currentMatchIndex >= matches.length) {
                        currentMatchIndex = 0;
                    }
                } else {
                    currentMatchIndex = -1;
                }
                
                updateMatchStatus(shouldHighlight);
            }

            function updateMatchStatus(shouldHighlight = true) {
                const countEl = document.getElementById('match-count');
                const findInput = document.getElementById('find-input');
                if (!countEl || !findInput) return;

                if (matches.length === 0 || currentMatchIndex === -1) {
                    countEl.textContent = '0/0';
                    return;
                }
                countEl.textContent = `${currentMatchIndex + 1}/${matches.length}`;
                
                if (shouldHighlight) {
                    const term = findInput.value;
                    quill.setSelection(matches[currentMatchIndex], term.length);
                }
            }

            function findNext() {
                if (matches.length === 0) return;
                currentMatchIndex = (currentMatchIndex + 1) % matches.length;
                updateMatchStatus(true);
            }

            function findAll() {
                const findInput = document.getElementById('find-input');
                if (!findInput || matches.length === 0) return;
                
                clearHighlights();
                
                const term = findInput.value;
                matches.forEach(index => {
                    quill.formatText(index, term.length, 'background', 'yellow');
                    highlightedRanges.push({ index, length: term.length });
                });
            }

            function replace() {
                const findInput = document.getElementById('find-input');
                const replaceInput = document.getElementById('replace-input');
                if (!findInput || !replaceInput) return;

                if (matches.length === 0 || currentMatchIndex === -1) return;
                
                const term = findInput.value;
                const replacement = replaceInput.value;
                const index = matches[currentMatchIndex];
                
                // Preserve current match index to highlight the next one after replacement
                const oldIndex = currentMatchIndex;
                
                quill.deleteText(index, term.length);
                quill.insertText(index, replacement);
                
                // Re-calculate matches
                updateMatches(false); 
                
                // Move to the next match (which is now at the same currentMatchIndex if it exists)
                if (matches.length > 0) {
                    currentMatchIndex = oldIndex % matches.length;
                    updateMatchStatus(true);
                }
            }

            function replaceAll() {
                const findInput = document.getElementById('find-input');
                const replaceInput = document.getElementById('replace-input');
                if (!findInput || !replaceInput) return;

                const term = findInput.value;
                const replacement = replaceInput.value;
                if (!term) return;

                const text = quill.getText();
                const allMatches = [];
                let index = 0;
                
                while ((index = text.indexOf(term, index)) !== -1) {
                    allMatches.push(index);
                    index += term.length;
                }

                // Apply replacements backwards to avoid index shifts
                for (let i = allMatches.length - 1; i >= 0; i--) {
                    quill.deleteText(allMatches[i], term.length);
                    quill.insertText(allMatches[i], replacement);
                }
                
                updateMatches(false);
            }

            function getContent() { return quill ? quill.root.innerHTML : ''; }
            function setContent(html) { if (quill) quill.root.innerHTML = html; }

            function generateSlug(title) {
                return title.toLowerCase()
                    .replace(/[^\w\s-]/g, '')
                    .replace(/[\s_]+/g, '-')
                    .replace(/^-+|-+$/g, '')
                    .substring(0, 32);
            }

            function destroy() { quill = null; highlightedRanges = []; }

            return { init, getContent, setContent, generateSlug, destroy, toggleFindReplace, findNext, findAll, replace, replaceAll };
        })();

                    const q = `%${homeQuery}%`;
                    args.push(q, q, q);
                }
                if (homeCat) {
                    sql += " AND category = ?";
                    args.push(homeCat);
                }
                sql += " ORDER BY created_at DESC";
                const result = await DB.execute(sql, args);
                const total = result.rows.length;
                const totalPages = Math.max(1, Math.ceil(total / POSTS_PER_PAGE));
                if (homePage > totalPages) homePage = totalPages;
                const start = (homePage - 1) * POSTS_PER_PAGE;

                    } catch (e) {
                        // ignore if views column isn't there or token doesn't allow write
                    }

                    const result = await DB.execute("SELECT * FROM posts WHERE slug = ? AND status = 'published'", [params.slug]);
                    if (!result.rows.length) { UI.render404(); return; }
                    const post = result.rows[0];
                    
                    // Fetch comments

                    let reactions = [];
                    try {
                        const commentsResult = await DB.execute("SELECT * FROM comments WHERE post_id = ? ORDER BY created_at DESC", [post.id]);
                        comments = commentsResult.rows || [];
                        
                        if(comments.length > 0) {
                            try {

                                reactions = reactionsResult.rows || [];
                            } catch(e){}
                        }
                    } catch (e) {
                        // Table might not exist yet if migration failed
                    }
                    
                    // Get prev/next posts for navigation
                    const allPosts = await DB.execute("SELECT id, title, slug FROM posts WHERE status = 'published' ORDER BY created_at DESC");
                    const idx = allPosts.rows.findIndex(p => p.id === post.id);
                    const prev = idx < allPosts.rows.length - 1 ? allPosts.rows[idx + 1] : null;

            function updateForgotCountdown() {
                const btn = document.getElementById('forgot-submit-btn');
                const countEl = document.getElementById('forgot-countdown');
                if (!btn || !countEl) return;

                const check = () => {
                    const now = Date.now();
                    const secondsLeft = Math.ceil((60000 - (now - lastResetRequestTime)) / 1000);

                    if (secondsLeft > 0) {
                        btn.disabled = true;
                        btn.style.opacity = '0.7';
                        btn.style.cursor = 'not-allowed';
                        countEl.textContent = `Please wait ${secondsLeft} seconds...`;
                        requestAnimationFrame(() => {
                            setTimeout(check, 1000);
                        });
                    } else {
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        btn.style.cursor = 'pointer';
                        countEl.textContent = '';
                    }
                };
                check();
            }

            async function handleForgotPassword(e) {
                e.preventDefault();

                const now = Date.now();
                const secondsLeft = Math.ceil((60000 - (now - lastResetRequestTime)) / 1000);
                if (secondsLeft > 0) {

                    return;

                    const display = document.getElementById('reset-token-display');
                    display.classList.remove('hidden');

                                <p style="margin-bottom:8px">A password reset link has been sent to:</p>
                                <ul style="margin:8px 0 12px;padding-left:20px">

                                </ul>
                                <p style="font-size:.82rem;color:var(--text-tertiary)">Check your email and click the reset link.</p>`;
                            UI.showToast('Reset link sent to admin emails!', 'success');
                        } else {
                            display.innerHTML = `<strong>Reset Link:</strong><br><br><a href="#reset/${token}" style="word-break:break-all">${resetUrl}</a><br><br><p style="color:var(--warning);font-size:.82rem">Email service not configured. Use the link above to reset your password.</p>`;
                            UI.showToast('Reset token generated (email not configured)', 'warning');
                        }
                    } else {
                        display.innerHTML = `<strong>Reset Link:</strong><br><br><a href="#reset/${token}">Click here to reset password</a>`;
                        UI.showToast('Reset token generated', 'success');
                    }
                } catch (e) { UI.showToast(e.message, 'error'); }
            }

            async function handleResetPassword(e, token) {

                if (pass.length < 6) { UI.showToast('Minimum 6 characters', 'error'); return; }
                try {
                    await Auth.resetPassword(token, pass);
                    UI.showToast('Password updated! Please login.', 'success');
                    Router.navigate('login');
                } catch (e) { UI.showToast(e.message, 'error'); }

            // -- Search with Debounce --
            /**
             * Debounce prevents the search from firing on every keystroke.

            function onSearch(val) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    homeQuery = val;
                    homePage = 1;
                    loadHomePosts().catch(e => UI.showToast(e.message, 'error'));

                debounceTimer = setTimeout(() => {

            // -- Password Generator (16 char with numbers, letters, special chars) --
            /**
             * Generates a cryptographically secure random password.
             * Uses crypto.getRandomValues() for randomness.
             * Guarantees at least one uppercase, lowercase, digit, and special character.
             * @param {number} length - Desired password length (default: 16)
             * @returns {string} The generated password
             */
            function generateRandomPassword(length = 16) {
                const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const lower = 'abcdefghijklmnopqrstuvwxyz';
                const digits = '0123456789';
                const special = '!@#$%&*_+-=?';
                const all = upper + lower + digits + special;

                const arr = new Uint8Array(length);
                crypto.getRandomValues(arr);

                // Ensure at least one character from each category
                let chars = [];
                chars.push(upper[arr[0] % upper.length]);
                chars.push(lower[arr[1] % lower.length]);
                chars.push(digits[arr[2] % digits.length]);
                chars.push(special[arr[3] % special.length]);

                // Fill remaining positions with random characters from all categories
                for (let i = 4; i < length; i++) {
                    chars.push(all[arr[i] % all.length]);
                }

                // Shuffle using Fisher-Yates with cryptographic randomness
                const shuffleBytes = new Uint8Array(chars.length);
                crypto.getRandomValues(shuffleBytes);
                for (let i = chars.length - 1; i > 0; i--) {
                    const j = shuffleBytes[i] % (i + 1);
                    [chars[i], chars[j]] = [chars[j], chars[i]];
                }

                return chars.join('');
            }

            // -- Auto Setup: Create superadmin on first startup --
            /**
             * Automatically creates a superadmin account on the first startup
             * of the application when no admin users exist in the database.
             *
             * The generated credentials are:
             * - Sent via email (if EmailJS is configured)
             * - Shown in a modal dialog (as fallback)
             * - Logged to the browser console (as additional safety net)
             */
            let autoSetupDone = false;
            async function autoSetupSuperAdmin() {
                if (autoSetupDone) return;
                autoSetupDone = true;

                if (!DB.isConfigured() || !DB.hasWriteAccess()) return;

                try {
                    // Ensure database tables exist
                    await DB.initTables();

                    // Check if any admin user already exists
                    const exists = await Auth.adminExists();
                    if (exists) return; // Admin already exists, skip auto-creation

                    // Generate 16-char password with mixed character types
                    const username = 'superadmin';
                    const password = generateRandomPassword(16);

                    // Create the superadmin account in the database
                    await Auth.createAdmin(username, password, 'Admin');

                    // Attempt to send credentials via email
                    const emailSent = await EmailService.sendAdminCredentials(username, password);

                    if (emailSent) {
                        UI.showToast('Superadmin account created! Credentials sent to admin emails.', 'success');
                    } else {
                        // Fallback: Show credentials in a modal dialog
                        UI.showModal('Superadmin Account Created', `
                            <p style="margin-bottom:16px">A superadmin account has been automatically created for first-time setup.</p>
                            <p style="margin-bottom:16px;color:var(--danger);font-weight:600">Save these credentials now! They will not be shown again.</p>
                            <div style="background:var(--bg-tertiary);padding:20px;border-radius:var(--radius-md);margin-bottom:16px;border:1px solid var(--border)">
                                <p style="margin-bottom:10px"><strong>Username:</strong> <code style="background:var(--accent-soft);padding:3px 10px;border-radius:4px;user-select:all;font-family:var(--font-mono)">${username}</code></p>
                                <p><strong>Password:</strong> <code style="background:var(--accent-soft);padding:3px 10px;border-radius:4px;user-select:all;font-family:var(--font-mono);letter-spacing:0.5px">${password}</code></p>
                            </div>
                            <p style="color:var(--warning);font-size:.85rem;line-height:1.6">
                                <strong>Note:</strong> Email notifications are not configured. Please copy and securely save these credentials, then change the password after your first login.
                            </p>
                            <p style="color:var(--text-tertiary);font-size:.82rem;margin-top:12px">
                                To enable email notifications, configure EmailJS in the source code (see the EmailService module).
                            </p>
                        `, [
                            { label: "I've Saved These Credentials", class: 'btn-primary', onclick: 'UI.closeModal()' }
                        ]);
                    }

                    // Credentials are shown in the UI modal or sent via email.
                    // Removed console logging for security purposes.

                } catch (e) {
                    // Fail silently to avoid interrupting the app flow during auto-setup
                }
            }

            // -- Initialize --
            function init() {
                initTheme();
                setupRoutes();
                UI.updateNav();

                // Theme toggle button
                document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

                // Mobile menu toggle
                document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                    document.getElementById('nav-links').classList.toggle('open');
                });

                // Global "fresh start" for all hash links and nav menu closing
                document.addEventListener('click', (e) => {
                    const link = e.target.closest('a');
                    if (link) {
                        const href = link.getAttribute('href');
                        if (href && href.startsWith('#')) {
                            // Close main navbar (mobile)
                            const navMenu = document.getElementById('nav-links');
                            if (navMenu) navMenu.classList.remove('open');

                            // Close admin sidebar (if open)
                            const sidebar = document.getElementById('admin-sidebar');
                            const overlay = document.getElementById('admin-sidebar-overlay');
                            if (sidebar) sidebar.classList.remove('open');
                            if (overlay) overlay.classList.remove('visible');

                            const targetHash = href.slice(1) || 'home';
                            const currentHash = window.location.hash.slice(1) || 'home';

                            // If clicking same link, manually trigger resolve for "fresh start"
                            if (targetHash === currentHash) {
                                Router.resolve();
                            }
                        }
                    } else if (e.target.tagName === 'BUTTON') {
                        // Close main navbar if a button inside it was clicked
                        const navMenu = document.getElementById('nav-links');
                        if (navMenu && e.target.closest('#nav-links')) {
                            navMenu.classList.remove('open');
                        }
                    }
                });

                // Keyboard: close modal on Escape
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') UI.closeModal();
                });

                // Slug field manual edit detection
                document.addEventListener('input', (e) => {
                    if (e.target.id === 'post-slug') slugManuallyEdited = true;
                });

                // Initialize EmailJS for email notifications
                EmailService.init();

                // Initial route resolve
                if (!window.location.hash) window.location.hash = '#home';
                else Router.resolve();

                // Initialize AOS animations
                AOS.init({
                    duration: 600,
                    easing: 'ease-out-cubic',
                    once: true,
                    offset: 50
                });

                // Auto-setup: Create superadmin if no admin exists (first startup)
                autoSetupSuperAdmin();
            }

            init();

            // Expose public API for inline event handlers
            return {
                handleLogin, handleSetup, handlePostSubmit,
                toggleStatus, confirmDelete, deletePost, autoSlug, logout,
                onSearch, onAdminSearch, filterCategory, goToPage, goToAdminPage,
                handleForgotPassword, handleResetPassword,
                showAddUserModal, addUser, showChangeRoleModal, changeRole,
                confirmDeleteUser, deleteUser,
                onUserSearch, goToUserPage, showUserDetailsModal, updateUserPassword,
                goToDashboardPage, clearHomeSearch, clearAdminSearch, clearUserSearch,
                togglePasswordVisibility, toggleAdminSidebar, closeAdminSidebar
            };
        })();

    </script>
