<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagar's Blogs</title>
    <meta name="description" content="A modern serverless blog powered by Turso SQLite">
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

    <style>
        /* ============================================================
   INKWELL BLOG — COMPLETE DESIGN SYSTEM
   CSS Custom Properties, Reset, Typography, Components,
   Dark Mode, Skeleton Loaders, Responsive Layout
   ============================================================ */

        /* ---------- Theme Variables ---------- */
        :root {
            --bg-primary: #f7f8fc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #eef1f6;
            --bg-input: #f1f4f9;
            --text-primary: #0f172a;
            --text-secondary: #4b5563;
            --text-tertiary: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-soft: #eef2ff;
            --accent-glow: rgba(99, 102, 241, 0.13);
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            --success: #10b981;
            --success-soft: #d1fae5;
            --warning: #f59e0b;
            --warning-soft: #fef3c7;
            --danger: #ef4444;
            --danger-soft: #fee2e2;
            --info: #3b82f6;
            --info-soft: #dbeafe;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 24px 48px rgba(0, 0, 0, 0.10);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: 0.22s cubic-bezier(.4, 0, .2, 1);
            --nav-h: 68px;
            --max-w: 1200px;
            --skel-base: #e5e7eb;
            --skel-shine: #f9fafb;
            --nav-bg: rgba(255, 255, 255, 0.82);
            --hero-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --card-hover-y: -6px;
            --quill-bg: #ffffff;
            --quill-text: #0f172a;
            --quill-border: #e5e7eb;
        }

        [data-theme="dark"] {
            --bg-primary: #0c1222;
            --bg-secondary: #141c2e;
            --bg-tertiary: #1b2540;
            --bg-input: #1b2540;
            --text-primary: #e8ecf4;
            --text-secondary: #8e9bba;
            --text-tertiary: #4e5e80;
            --accent: #818cf8;
            --accent-hover: #a5b4fc;
            --accent-soft: rgba(129, 140, 248, 0.12);
            --accent-glow: rgba(129, 140, 248, 0.18);
            --border: #1f2d47;
            --border-light: #172035;
            --success-soft: rgba(16, 185, 129, 0.14);
            --warning-soft: rgba(245, 158, 11, 0.14);
            --danger-soft: rgba(239, 68, 68, 0.14);
            --info-soft: rgba(59, 130, 246, 0.14);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.40);
            --shadow-xl: 0 24px 48px rgba(0, 0, 0, 0.45);
            --skel-base: #1b2540;
            --skel-shine: #243352;
            --nav-bg: rgba(12, 18, 34, 0.82);
            --hero-grad: linear-gradient(135deg, #4338ca 0%, #7c3aed 50%, #be185d 100%);
            --card-hover-y: -4px;
            --quill-bg: #141c2e;
            --quill-text: #e8ecf4;
            --quill-border: #1f2d47;
        }

        /* ---------- Reset ---------- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.65;
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            overflow-x: hidden
        }

        img {
            max-width: 100%;
            display: block
        }

        a {
            color: var(--accent);
            text-decoration: none;
            transition: color var(--transition)
        }

        a:hover {
            color: var(--accent-hover)
        }

        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none
        }

        input,
        select,
        textarea {
            font-family: inherit;
            font-size: inherit
        }

        ul,
        ol {
            list-style: none
        }

        /* ---------- Scrollbar ---------- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 99px
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary)
        }

        /* ---------- Typography ---------- */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            line-height: 1.25;
            font-weight: 700;
            color: var(--text-primary)
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.2rem)
        }

        h2 {
            font-size: clamp(1.5rem, 3.5vw, 2.2rem)
        }

        h3 {
            font-size: clamp(1.2rem, 2.5vw, 1.6rem)
        }

        p {
            color: var(--text-secondary)
        }

        /* ---------- Layout ---------- */
        .container {
            width: 100%;
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px
        }

        .page-padding {
            padding-top: calc(var(--nav-h) + 32px);
            padding-bottom: 64px;
            min-height: 80vh
        }

        /* ---------- Navbar ---------- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-h);
            background: var(--nav-bg);
            backdrop-filter: blur(16px) saturate(1.8);
            -webkit-backdrop-filter: blur(16px) saturate(1.8);
            border-bottom: 1px solid var(--border-light);
            z-index: 1000;
            transition: background var(--transition), border-color var(--transition)
        }

        .nav-inner {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--text-primary);
            text-decoration: none;
            transition: opacity var(--transition)
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent)
        }

        .nav-brand:hover {
            opacity: .8;
            color: var(--text-primary)
        }

        .nav-brand svg {
            width: 28px;
            height: 28px;
            color: var(--accent)
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .nav-links a,
        .nav-links button {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: .875rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition);
            text-decoration: none;
            white-space: nowrap
        }

        .nav-links a:hover,
        .nav-links button:hover {
            background: var(--accent-soft);
            color: var(--accent)
        }

        .nav-links a.active {
            background: var(--accent-soft);
            color: var(--accent)
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            transition: all var(--transition);
            color: var(--text-secondary)
        }

        .theme-toggle:hover {
            background: var(--accent-soft);
            color: var(--accent)
        }

        .theme-toggle svg {
            width: 28px;
            height: 28px
        }

        .mobile-menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            color: var(--text-secondary)
        }

        .mobile-menu-btn svg {
            width: 22px;
            height: 22px
        }

        @media(max-width:768px) {
            .nav-links {
                position: fixed;
                top: var(--nav-h);
                left: 0;
                right: 0;
                background: var(--bg-secondary);
                border-bottom: 1px solid var(--border);
                flex-direction: column;
                padding: 16px;
                gap: 4px;
                transform: translateY(-120%);
                opacity: 0;
                transition: all .3s ease;
                pointer-events: none
            }

            .nav-links.open {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto
            }

            .nav-links a,
            .nav-links button {
                width: 100%;
                text-align: left;
                padding: 12px 16px
            }

            .mobile-menu-btn {
                display: flex
            }
        }

        /* ---------- Hero ---------- */
        .hero {
            background: var(--hero-grad);
            padding: 100px 24px 80px;
            margin-top: var(--nav-h);
            text-align: center;
            position: relative;
            overflow: hidden
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")
        }

        .hero h1 {
            font-family: var(--font-display);
            color: #fff;
            font-size: clamp(2.5rem, 6vw, 4.2rem);
            margin-bottom: 16px;
            position: relative
        }

        .hero p {
            color: rgba(255, 255, 255, 0.85);
            font-size: clamp(1rem, 2vw, 1.25rem);
            max-width: 600px;
            margin: 0 auto 32px;
            position: relative
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 1rem;
            transition: all var(--transition);
            position: relative;
            backdrop-filter: blur(8px)
        }

        .hero-cta:hover {
            background: rgba(255, 255, 255, 0.28);
            color: #fff;
            transform: translateY(-2px)
        }

        /* ---------- Section Titles ---------- */
        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px
        }

        .section-title h2 {
            font-size: 1.5rem
        }

        .section-title .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        /* ---------- Search ---------- */
        .search-box {
            position: relative;
            max-width: 400px;
            width: 100%
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 42px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            font-size: .875rem;
            color: var(--text-primary);
            transition: all var(--transition);
            outline: none
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow)
        }

        .search-box input::placeholder {
            color: var(--text-tertiary)
        }

        .search-box svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-tertiary);
            pointer-events: none
        }

        .search-box .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            pointer-events: auto;
            border: none;
            padding: 0
        }

        .search-box .search-clear:hover {
            background: var(--danger-soft);
            color: var(--danger)
        }

        .search-box .search-clear svg {
            position: static;
            transform: none;
            width: 14px;
            height: 14px;
            pointer-events: none
        }

        .search-box input:not(.has-value)~.search-clear,
        .search-box input:not([value*=""])~.search-clear {
            display: none
        }

        .search-box input.has-value~.search-clear {
            display: flex
        }

        /* ---------- Password Input with Toggle ---------- */
        .password-input-wrap {
            position: relative;
            display: flex;
            align-items: center
        }

        .password-input-wrap .form-input {
            padding-right: 40px;
            width: 100%
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-tertiary);
            background: none;
            border: none;
            padding: 0;
            transition: color var(--transition)
        }

        .password-toggle:hover {
            color: var(--text-secondary)
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
            pointer-events: none
        }

        /* ---------- Category Badges ---------- */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: .02em;
            text-transform: uppercase
        }

        .badge-tech {
            background: var(--info-soft);
            color: var(--info)
        }

        .badge-design {
            background: #fce7f3;
            color: #be185d
        }

        [data-theme="dark"] .badge-design {
            background: rgba(190, 24, 93, 0.14);
            color: #f9a8d4
        }

        .badge-lifestyle {
            background: var(--success-soft);
            color: var(--success)
        }

        .badge-business {
            background: var(--warning-soft);
            color: var(--warning)
        }

        .badge-general {
            background: var(--bg-tertiary);
            color: var(--text-secondary)
        }

        .badge-status {
            padding: 4px 10px;
            font-size: .7rem
        }

        .badge-published {
            background: var(--success-soft);
            color: var(--success)
        }

        .badge-draft {
            background: var(--warning-soft);
            color: var(--warning)
        }

        /* ---------- Post Grid ---------- */
        .post-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px
        }

        @media(max-width:480px) {
            .post-grid {
                grid-template-columns: 1fr
            }
        }

        /* ---------- Featured Post ---------- */
        .featured-post {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 0;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
            border: 1px solid var(--border-light);
            margin-bottom: 40px
        }

        .featured-post:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-3px)
        }

        .featured-post .fp-image {
            height: 100%;
            min-height: 320px;
            background-size: cover;
            background-position: center;
            position: relative
        }

        .featured-post .fp-image::after {
            content: 'FEATURED';
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--accent);
            color: #fff;
            padding: 6px 16px;
            border-radius: var(--radius-full);
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .06em
        }

        .featured-post .fp-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px
        }

        .featured-post .fp-content h2 {
            font-size: 1.75rem;
            line-height: 1.3
        }

        .featured-post .fp-content h2 a {
            color: var(--text-primary);
            text-decoration: none
        }

        .featured-post .fp-content h2 a:hover {
            color: var(--accent)
        }

        .featured-post .fp-content p {
            color: var(--text-secondary);
            font-size: .95rem;
            line-height: 1.7
        }

        .featured-post .fp-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: .8rem;
            color: var(--text-tertiary)
        }

        .featured-post .fp-meta svg {
            width: 14px;
            height: 14px
        }

        .featured-post .fp-meta span {
            display: flex;
            align-items: center;
            gap: 5px
        }

        @media(max-width:768px) {
            .featured-post {
                grid-template-columns: 1fr
            }

            .featured-post .fp-image {
                min-height: 220px
            }

            .featured-post .fp-content {
                padding: 24px
            }
        }

        /* ---------- Post Card ---------- */
        .post-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column
        }

        .post-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(var(--card-hover-y))
        }

        .post-card .card-image {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative
        }

        .post-card .card-image .badge {
            position: absolute;
            top: 14px;
            left: 14px
        }

        .post-card .card-body {
            padding: 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .post-card .card-body h3 {
            font-size: 1.15rem;
            line-height: 1.35
        }

        .post-card .card-body h3 a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color var(--transition)
        }

        .post-card .card-body h3 a:hover {
            color: var(--accent)
        }

        .post-card .card-body .excerpt {
            color: var(--text-secondary);
            font-size: .88rem;
            line-height: 1.65;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .post-card .card-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: .78rem;
            color: var(--text-tertiary);
            padding-top: 10px;
            border-top: 1px solid var(--border-light);
            margin-top: auto
        }

        .post-card .card-meta svg {
            width: 13px;
            height: 13px
        }

        .post-card .card-meta span {
            display: flex;
            align-items: center;
            gap: 4px
        }

        /* ---------- Post Reading View ---------- */
        .post-view {
            max-width: 780px;
            margin: 0 auto;
            padding-top: calc(var(--nav-h) + 48px);
            padding-bottom: 80px
        }

        .post-view .post-header {
            text-align: center;
            margin-bottom: 48px
        }

        .post-view .post-header .badge {
            margin-bottom: 16px
        }

        .post-view .post-header h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 20px;
            line-height: 1.2
        }

        .post-view .post-header .post-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: var(--text-tertiary);
            font-size: .85rem
        }

        .post-view .post-header .post-meta svg {
            width: 15px;
            height: 15px
        }

        .post-view .post-header .post-meta span {
            display: flex;
            align-items: center;
            gap: 5px
        }

        .post-view .post-cover {
            width: 100%;
            height: auto;
            max-height: 460px;
            object-fit: cover;
            border-radius: var(--radius-lg);
            margin-bottom: 48px
        }

        .post-view .post-body {
            font-size: 1.08rem;
            line-height: 1.85;
            color: var(--text-secondary)
        }

        .post-view .post-body h1,
        .post-view .post-body h2,
        .post-view .post-body h3 {
            margin: 36px 0 16px;
            color: var(--text-primary)
        }

        .post-view .post-body p {
            margin-bottom: 20px
        }

        .post-view .post-body blockquote {
            border-left: 4px solid var(--accent);
            padding: 16px 24px;
            margin: 24px 0;
            background: var(--accent-soft);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-style: italic;
            color: var(--text-secondary)
        }

        .code-block-wrapper {
            position: relative;
            margin: 24px 0;
        }

        .post-view .post-body pre {
            background: var(--bg-tertiary);
            padding: 20px;
            padding-top: 40px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: .88rem;
            margin: 0;
            border: 1px solid var(--border)
        }

        .code-hdr {
            position: absolute;
            top: 1px;
            right: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(45, 45, 45, 0.95);
            padding: 2px 4px;
            border-bottom-left-radius: 8px;
            border-top-right-radius: var(--radius-md);
            box-shadow: -2px 2px 4px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .code-lang {
            color: #b58900;
            font-size: 0.85rem;
            font-family: var(--font-mono);
            font-weight: 600;
        }

        .copy-code-btn {
            background: transparent;
            color: #8e9bba;
            border: none;
            padding: 2px 4px;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.82rem;
            font-family: var(--font-sans);
        }

        .copy-code-btn:hover {
            color: #ffffff;
            background: transparent;
        }

        .post-view .post-body code {
            font-family: var(--font-mono);
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: .88em
        }

        .post-view .post-body pre code {
            background: none;
            padding: 0
        }

        .post-view .post-body img {
            max-width: 100%;
            border-radius: var(--radius-md);
            margin: 24px 0
        }

        .post-view .post-body a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 3px
        }

        .post-view .post-body ul,
        .post-view .post-body ol {
            margin: 16px 0 16px 28px
        }

        .post-view .post-body li {
            margin-bottom: 8px
        }

        .post-view .post-body ul li {
            list-style: disc
        }

        .post-view .post-body ol li {
            list-style: decimal
        }

        .post-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 56px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            gap: 16px
        }

        .post-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: .88rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition);
            max-width: 48%
        }

        .post-nav a:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft)
        }

        .post-nav a svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0
        }

        .post-nav-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        /* ---------- Admin Layout ---------- */
        .admin-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 0;
            min-height: calc(100vh - var(--nav-h))
        }

        .admin-sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 28px 0;
            position: sticky;
            top: var(--nav-h);
            height: calc(100vh - var(--nav-h))
        }

        .admin-sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 24px;
            font-size: .88rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition);
            border-left: 3px solid transparent;
            text-decoration: none
        }

        .admin-sidebar a:hover {
            background: var(--accent-soft);
            color: var(--accent)
        }

        .admin-sidebar a.active {
            background: var(--accent-soft);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600
        }

        .admin-sidebar a svg {
            width: 18px;
            height: 18px
        }

        .admin-sidebar .sidebar-section {
            padding: 0 24px;
            margin-bottom: 12px;
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--text-tertiary)
        }

        .admin-content {
            padding: 32px;
            overflow-y: auto
        }

        /* Post Hero with Background Image */
        .post-hero-bg {
            position: relative;
            min-height: 70vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            text-align: center;
            padding: 100px 24px 60px;
            margin: calc(-1 * var(--nav-h)) calc(-50vw + 50%);
            padding-top: calc(var(--nav-h) + 60px);
            width: 100vw;
            left: 0;
            right: 0
        }

        .post-hero-bg-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(1px)
        }

        .post-hero-bg-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            color: #fff;
            width: 100%
        }

        .post-back-link-bg {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 16px;
            transition: color 0.2s ease;
            white-space: nowrap
        }

        .post-back-link-bg:hover {
            color: #fff
        }

        .post-back-link-bg svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0
        }

        .post-title-bg {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.15;
            margin: 12px 0 20px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4)
        }

        .post-meta-bg {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 16px 24px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.85)
        }

        .post-meta-bg span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap
        }

        .post-meta-bg svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0
        }

        .post-body-wrapper {
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 24px
        }

        /* Go to Top Floating Button */
        .go-to-top-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 20px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.5);
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            border: none
        }

        .go-to-top-btn.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0)
        }

        .go-to-top-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-xl)
        }

        /* Admin Sidebar Mobile Toggle */
        .admin-sidebar-toggle-inline {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: all var(--transition)
        }

        .admin-sidebar-toggle-inline:hover {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: var(--accent)
        }

        .admin-sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
            opacity: 0;
            transition: opacity 0.3s ease
        }

        .admin-sidebar-overlay.visible {
            display: block;
            opacity: 1
        }

        @media(max-width:860px) {
            .admin-layout {
                grid-template-columns: 1fr
            }

            .admin-sidebar {
                position: fixed;
                top: var(--nav-h);
                left: 0;
                bottom: 0;
                width: 260px;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                display: block;
                height: calc(100vh - var(--nav-h));
                box-shadow: var(--shadow-xl)
            }

            .admin-sidebar.open {
                transform: translateX(0)
            }

            .admin-sidebar-toggle-inline {
                display: flex !important
            }

            .admin-content {
                padding: 24px 16px
            }
        }

        /* ---------- Stat Cards ---------- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 24px;
            transition: all var(--transition)
        }

        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px)
        }

        .stat-card .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px
        }

        .stat-card .stat-icon svg {
            width: 22px;
            height: 22px
        }

        .stat-card .stat-icon.blue {
            background: var(--info-soft);
            color: var(--info)
        }

        .stat-card .stat-icon.green {
            background: var(--success-soft);
            color: var(--success)
        }

        .stat-card .stat-icon.amber {
            background: var(--warning-soft);
            color: var(--warning)
        }

        .stat-card .stat-icon.purple {
            background: var(--accent-soft);
            color: var(--accent)
        }

        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1
        }

        .stat-card .stat-label {
            font-size: .82rem;
            color: var(--text-tertiary);
            margin-top: 6px
        }

        /* ---------- Data Table ---------- */
        .data-table-wrap {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            overflow: hidden
        }

        .data-table {
            width: 100%;
            border-collapse: collapse
        }

        .data-table thead {
            background: var(--bg-tertiary)
        }

        .data-table th {
            padding: 14px 18px;
            text-align: left;
            font-size: .78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: var(--text-tertiary);
            border-bottom: 1px solid var(--border)
        }

        .data-table td {
            padding: 14px 18px;
            font-size: .88rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle
        }

        .data-table tr:last-child td {
            border-bottom: none
        }

        .data-table tr:hover td {
            background: var(--accent-soft)
        }

        .data-table .td-title {
            font-weight: 600;
            color: var(--text-primary);
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .table-actions {
            display: flex;
            gap: 6px
        }

        .table-actions button {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            color: var(--text-tertiary)
        }

        .table-actions button:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary)
        }

        .table-actions button.danger:hover {
            background: var(--danger-soft);
            color: var(--danger)
        }

        .table-actions button svg {
            width: 16px;
            height: 16px
        }

        @media(max-width:640px) {
            .data-table-wrap {
                overflow-x: auto
            }

            .data-table {
                min-width: 600px
            }
        }

        /* ---------- Buttons ---------- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: var(--radius-sm);
            font-size: .875rem;
            font-weight: 600;
            transition: all var(--transition);
            white-space: nowrap;
            border: 1px solid transparent;
            outline: none
        }

        .btn:focus-visible {
            box-shadow: 0 0 0 3px var(--accent-glow)
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: var(--shadow-md)
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border)
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft)
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger)
        }

        .btn-danger:hover {
            opacity: .9;
            transform: translateY(-1px)
        }

        .btn-ghost {
            color: var(--text-secondary);
            padding: 8px 14px
        }

        .btn-ghost:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary)
        }

        .btn-sm {
            padding: 7px 14px;
            font-size: .8rem
        }

        .btn-lg {
            padding: 14px 32px;
            font-size: 1rem
        }

        .btn svg {
            width: 18px;
            height: 18px
        }

        .btn-sm svg {
            width: 15px;
            height: 15px
        }

        /* ---------- Forms ---------- */
        .form-group {
            margin-bottom: 20px
        }

        .form-group label {
            display: block;
            font-size: .82rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 7px
        }

        .form-group .helper {
            font-size: .75rem;
            color: var(--text-tertiary);
            margin-top: 5px
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 11px 16px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: .9rem;
            color: var(--text-primary);
            transition: all var(--transition);
            outline: none
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: var(--bg-secondary)
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-tertiary)
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px
        }

        @media(max-width:540px) {
            .form-row {
                grid-template-columns: 1fr
            }
        }

        .form-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 36px;
            max-width: 520px;
            margin: 0 auto
        }

        .form-card h2 {
            margin-bottom: 8px;
            font-size: 1.5rem
        }

        .form-card .form-subtitle {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: .92rem
        }

        /* ---------- Quill Editor Overrides ---------- */
        .ql-toolbar.ql-snow {
            border: 1.5px solid var(--quill-border) !important;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0 !important;
            background: var(--bg-tertiary) !important
        }

        .ql-container.ql-snow {
            border: 1.5px solid var(--quill-border) !important;
            border-top: none !important;
            border-radius: 0 0 var(--radius-sm) var(--radius-sm) !important;
            background: var(--quill-bg) !important;
            font-family: var(--font-sans) !important;
            font-size: 1rem !important;
            min-height: 300px
        }

        .ql-editor {
            color: var(--quill-text) !important;
            min-height: 300px
        }

        .ql-editor.ql-blank::before {
            color: var(--text-tertiary) !important;
            font-style: normal !important
        }

        .ql-snow .ql-stroke {
            stroke: var(--text-secondary) !important
        }

        .ql-snow .ql-fill,
        .ql-snow .ql-stroke.ql-fill {
            fill: var(--text-secondary) !important
        }

        .ql-snow .ql-picker-label {
            color: var(--text-secondary) !important
        }

        .ql-snow .ql-picker-options {
            background: var(--bg-secondary) !important;
            border-color: var(--border) !important;
            border-radius: var(--radius-sm) !important
        }

        /* ---------- Modal ---------- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease
        }

        .modal-overlay.visible {
            opacity: 1;
            pointer-events: auto
        }

        .modal-box {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            max-width: 480px;
            width: 100%;
            padding: 32px;
            transform: translateY(16px) scale(.97);
            transition: transform .25s cubic-bezier(.4, 0, .2, 1);
            position: relative
        }

        .modal-overlay.visible .modal-box {
            transform: translateY(0) scale(1)
        }

        .modal-box h3 {
            font-size: 1.2rem;
            margin-bottom: 10px
        }

        .modal-box p {
            color: var(--text-secondary);
            font-size: .9rem;
            margin-bottom: 24px;
            line-height: 1.6
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            transition: all var(--transition)
        }

        .modal-close:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary)
        }

        .modal-close svg {
            width: 18px;
            height: 18px
        }

        /* ---------- Toast ---------- */
        .toast-container {
            position: fixed;
            top: calc(var(--nav-h) + 16px);
            right: 24px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            font-size: .88rem;
            font-weight: 500;
            color: var(--text-primary);
            pointer-events: auto;
            transform: translateX(120%);
            animation: toastIn .35s cubic-bezier(.4, 0, .2, 1) forwards;
            max-width: 380px
        }

        .toast.removing {
            animation: toastOut .3s ease forwards
        }

        .toast svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0
        }

        .toast.success {
            border-left: 4px solid var(--success)
        }

        .toast.success svg {
            color: var(--success)
        }

        .toast.error {
            border-left: 4px solid var(--danger)
        }

        .toast.error svg {
            color: var(--danger)
        }

        .toast.warning {
            border-left: 4px solid var(--warning)
        }

        .toast.warning svg {
            color: var(--warning)
        }

        .toast.info {
            border-left: 4px solid var(--info)
        }

        .toast.info svg {
            color: var(--info)
        }

        @keyframes toastIn {
            to {
                transform: translateX(0)
            }
        }

        @keyframes toastOut {
            to {
                transform: translateX(120%);
                opacity: 0
            }
        }

        /* ---------- Skeleton Loader ---------- */
        .skeleton {
            border-radius: var(--radius-sm);
            background: linear-gradient(90deg, var(--skel-base) 25%, var(--skel-shine) 50%, var(--skel-base) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .skel-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-light)
        }

        .skel-card .skel-img {
            height: 200px
        }

        .skel-card .skel-body {
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .skel-card .skel-line {
            height: 14px;
            border-radius: 6px
        }

        .skel-card .skel-line.w60 {
            width: 60%
        }

        .skel-card .skel-line.w80 {
            width: 80%
        }

        .skel-card .skel-line.w40 {
            width: 40%
        }

        .skel-card .skel-title {
            height: 22px;
            width: 85%;
            border-radius: 6px
        }

        .skel-featured {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-light);
            margin-bottom: 40px
        }

        .skel-featured .skel-img {
            min-height: 320px
        }

        .skel-featured .skel-body {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            justify-content: center
        }

        @media(max-width:768px) {
            .skel-featured {
                grid-template-columns: 1fr
            }

            .skel-featured .skel-img {
                min-height: 200px
            }
        }

        /* ---------- Pagination ---------- */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 40px
        }

        .pagination button {
            min-width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            font-size: .85rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition);
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center
        }

        .pagination button:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft)
        }

        .pagination button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .pagination button:disabled {
            opacity: .4;
            cursor: not-allowed
        }

        .pagination button svg {
            width: 16px;
            height: 16px
        }

        /* ---------- Empty State ---------- */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-tertiary)
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            opacity: .4
        }

        .empty-state h3 {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 8px
        }

        .empty-state p {
            font-size: .9rem;
            margin-bottom: 24px
        }

        /* ---------- Footer ---------- */
        .footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 40px 24px;
            text-align: center
        }

        .footer p {
            font-size: .85rem;
            color: var(--text-tertiary)
        }

        .footer a {
            color: var(--accent)
        }

        /* ---------- Setup / Auth Pages ---------- */
        .auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--nav-h));
            padding: 40px 24px
        }

        .setup-steps {
            display: flex;
            gap: 8px;
            margin-bottom: 28px
        }

        .setup-step {
            flex: 1;
            height: 4px;
            border-radius: 99px;
            background: var(--border)
        }

        .setup-step.done {
            background: var(--accent)
        }

        /* ---------- Tab bar ---------- */
        .tab-bar {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 24px
        }

        .tab-bar button {
            padding: 12px 20px;
            font-size: .88rem;
            font-weight: 500;
            color: var(--text-tertiary);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all var(--transition)
        }

        .tab-bar button:hover {
            color: var(--text-primary)
        }

        .tab-bar button.active {
            color: var(--accent);
            border-bottom-color: var(--accent)
        }

        /* ---------- Utilities ---------- */
        .hidden {
            display: none !important
        }

        .text-center {
            text-align: center
        }

        .mb-4 {
            margin-bottom: 16px
        }

        .mb-8 {
            margin-bottom: 32px
        }

        .mt-4 {
            margin-top: 16px
        }

        .flex {
            display: flex
        }

        .flex-between {
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .gap-2 {
            gap: 8px
        }

        .gap-4 {
            gap: 16px
        }

        .flex-wrap {
            flex-wrap: wrap
        }

        .w-full {
            width: 100%
        }

        /* ---------- Transition for page changes ---------- */
        .page-enter {
            animation: pageIn .3s ease forwards
        }

        @keyframes pageIn {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        // ==========================================
        // MODULE 2: DB — Turso HTTP API Client
        // ==========================================
        /**
         * Database module for communicating with Turso serverless SQLite.
         *
         * Turso HTTP API Pipeline (/v2/pipeline):
         * ────────────────────────────────────────
         * The pipeline endpoint allows batching multiple SQL statements
         * in a single HTTP POST request. Each statement is wrapped in
         * an "execute" request, and a "close" request ends the pipeline.
         *
         * Request structure:
         *   POST {dbUrl}/v2/pipeline
         *   Authorization: Bearer <token>
         *   Content-Type: application/json
         *   Body: {
         *     "requests": [
         *       { "type": "execute", "stmt": { "sql": "...", "args": [...] } },
         *       { "type": "close" }
         *     ]
         *   }
         *
         * Each arg is typed: { type: "text"|"integer"|"float"|"null", value: "..." }
         *
         * Response structure:
         *   {
         *     "results": [
         *       {
         *         "type": "ok",
         *         "response": {
         *           "type": "execute",
         *           "result": {
         *             "cols": [{ "name": "...", "decltype": "..." }],
         *             "rows": [[{ "type": "text", "value": "..." }, ...]],
         *             "affected_row_count": 0,
         *             "last_insert_rowid": null
         *           }
         *         }
         *       },
         *       { "type": "ok", "response": { "type": "close" } }
         *     ]
         *   }
         *
         * Security Model:
         * ───────────────
         * - readToken: A scoped token allowing only SELECT queries.
         *   This token CAN be embedded in client-side code since it
         *   provides read-only access to published content.
         *
         * - fullToken: A full-access token allowing INSERT, UPDATE, DELETE.
         *   This token MUST NOT be hardcoded. Instead, the admin provides
         *   it via the Settings UI, and it is stored in localStorage.
         *   This means only authenticated admins on trusted devices have
         *   write access.
         */
        const DB = (() => {
            const CONFIG_KEY = 'inkwell_db_config';
            // Hardcoded read-only credentials for public access
            // Full token is still stored in localStorage for admin write operations
            let config = {
                url: '__TURSO_DB_URL__',
                readToken: '__TURSO_READ_TOKEN__',
                fullToken: '__TURSO_FULL_TOKEN__'
            };

            function loadConfig() {
                try {
                    const s = localStorage.getItem(CONFIG_KEY);
                    if (s) {
                        const loaded = JSON.parse(s);
                        // Validate tokens don't contain non-ASCII characters
                        // (e.g. masked bullet chars '••••' from Settings page bug)
                        // which would cause: "String contains non ISO-8859-1 code point"
                        const hasNonAscii = (str) => str && /[^\x00-\xff]/.test(str);
                        if (hasNonAscii(loaded.readToken) || hasNonAscii(loaded.fullToken)) {
                            console.warn('[DB] Corrupted tokens in localStorage (non-ASCII chars). Clearing saved config.');
                            localStorage.removeItem(CONFIG_KEY);
                            localStorage.removeItem('inkwell_session');
                            return;
                        }
                        config = loaded;
                    }
                } catch (e) {
                    localStorage.removeItem(CONFIG_KEY);
                }
            }

            function saveConfig(url, readToken, fullToken) {
                config = { url: url.replace(/\/+$/, ''), readToken, fullToken };
                localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
            }

            function isConfigured() { return !!(config.url && config.readToken); }
            function hasWriteAccess() { return !!config.fullToken; }
            function getConfig() { return { ...config }; }

            /**
             * Execute a single SQL statement against the Turso HTTP API.
             *
             * @param {string} sql   — The SQL query string (parameterized with ?)
             * @param {Array}  args  — Positional arguments for the query
             * @param {boolean} write — If true, uses the fullToken for write access
             * @returns {Promise<{cols: string[], rows: Object[], affected: number, lastId: number|null}>}
             *
             * Internally, this builds a Turso pipeline request with a single
             * "execute" statement followed by a "close" to end the connection.
             * Arguments are converted from JS primitives to Turso's typed format.
             */
            async function execute(sql, args = [], write = false) {
                if (!isConfigured()) throw new Error('Database not configured. Go to Settings.');
                const token = write ? config.fullToken : config.readToken;
                if (write && !token) throw new Error('Write token not set. Add it in Settings.');

                // Convert JavaScript primitives to Turso typed argument format.
                // Turso expects each arg as an object with { type, value } where
                // type is one of: "text", "integer", "float", "null", "blob"
                const typedArgs = args.map(a => {
                    if (a === null || a === undefined) return { type: 'null', value: null };
                    if (typeof a === 'number') return Number.isInteger(a)
                        ? { type: 'integer', value: String(a) }
                        : { type: 'float', value: String(a) };
                    return { type: 'text', value: String(a) };
                });

                // Build the pipeline request body.
                // The pipeline consists of one "execute" request containing our SQL,
                // and one "close" request to signal we're done with this connection.
                const body = {
                    requests: [
                        { type: 'execute', stmt: { sql, args: typedArgs } },
                        { type: 'close' }
                    ]
                };

                const res = await fetch(`${config.url}/v2/pipeline`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    const t = await res.text();
                    throw new Error(`DB Error ${res.status}: ${t}`);
                }

                const data = await res.json();
                // The pipeline returns an array of results matching our requests.
                // results[0] corresponds to our "execute" request.
                if (data.results?.[0]?.type === 'error') {
                    throw new Error(data.results[0].error?.message || 'SQL execution error');
                }

                const result = data.results?.[0]?.response?.result;
                return parseResult(result);
            }

            /**
             * Parse Turso result object into a developer-friendly format.
             * Converts rows from arrays of typed cells to plain JS objects
             * keyed by column name. Also converts typed values back to
             * native JS types (integer → Number, float → Number, text → String).
             */
            function parseResult(result) {
                if (!result) return { cols: [], rows: [], affected: 0, lastId: null };
                const colNames = (result.cols || []).map(c => c.name);
                const rows = (result.rows || []).map(row => {
                    const obj = {};
                    row.forEach((cell, i) => {
                        if (cell.type === 'null') obj[colNames[i]] = null;
                        else if (cell.type === 'integer') obj[colNames[i]] = parseInt(cell.value, 10);
                        else if (cell.type === 'float') obj[colNames[i]] = parseFloat(cell.value);
                        else obj[colNames[i]] = cell.value;
                    });
                    return obj;
                });
                return {
                    cols: colNames,
                    rows,
                    affected: result.affected_row_count || 0,
                    lastId: result.last_insert_rowid ? parseInt(result.last_insert_rowid, 10) : null
                };
            }

            /**
             * Initialize the database schema.
             * Creates the posts and admin tables if they don't already exist.
             * This must be called with write access (fullToken).
             */
            async function initTables() {
                await execute(`CREATE TABLE IF NOT EXISTS posts (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                title TEXT NOT NULL,
                slug TEXT UNIQUE NOT NULL,
                content TEXT DEFAULT '',
                excerpt TEXT DEFAULT '',
                category TEXT DEFAULT 'General',
                tags TEXT DEFAULT '',
                status TEXT DEFAULT 'draft',
                cover_image TEXT DEFAULT '',
                created_at TEXT DEFAULT (datetime('now')),
                updated_at TEXT DEFAULT (datetime('now'))
            )`, [], true);
                await execute(`CREATE TABLE IF NOT EXISTS admin (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                username TEXT UNIQUE NOT NULL,
                password_hash TEXT NOT NULL,
                role TEXT DEFAULT 'Author',
                reset_token TEXT DEFAULT NULL,
                created_at TEXT DEFAULT (datetime('now')),
                updated_at TEXT DEFAULT (datetime('now'))
            )`, [], true);
            }

            loadConfig();
            return { execute, initTables, saveConfig, isConfigured, hasWriteAccess, getConfig, loadConfig };
        })();

        /**
         * Authentication module using the Web Crypto API for password hashing.
         *
         * Web Crypto API — Password Hashing with SHA-256:
         * ────────────────────────────────────────────────
         * The browser's built-in crypto.subtle API provides cryptographic
         * primitives without requiring external libraries.
         *
         * Hashing Process:
         *   1. Encode the plaintext password to bytes using TextEncoder
         *      → TextEncoder.encode(password) returns Uint8Array
         *   2. Compute SHA-256 digest using crypto.subtle.digest()
         *      → Returns a Promise<ArrayBuffer> containing the 32-byte hash
         *   3. Convert ArrayBuffer to a Uint8Array for iteration
         *   4. Map each byte to a 2-character hex string (padded with '0')
         *   5. Join all hex strings to produce the final 64-char hash
         *
         * Session Management:
         *   Sessions are stored in localStorage as JSON with:
         *   - user: { id, username, role }
         *   - expiresAt: Unix timestamp (24h from creation)
         *   On each auth check, expiry is validated. Expired sessions
         *   are automatically cleared.
         *
         * Role-Based Access Control (RBAC):
         *   Three roles: Admin, Editor, Author
         *   - Admin: Full access (CRUD posts, manage users, settings)
         *   - Editor: Can create/edit/delete posts
         *   - Author: Can create own posts only
         *
         * Password Reset Flow:
         *   1. User requests reset → generateResetToken(username)
         *   2. A cryptographically random 64-char hex token is generated
         *      using crypto.getRandomValues(Uint8Array(32))
         *   3. Token is stored in the admin table's reset_token column
         *   4. User navigates to #reset/<token> and provides new password
         *   5. resetPassword(token, newPass) validates token and updates hash
         */
        const Auth = (() => {
            const SESSION_KEY = 'inkwell_session';
            const DURATION = 24 * 60 * 60 * 1000; // 24 hours in ms
            let currentUser = null;

            /**
             * Hash a password string to SHA-256 hex.
             *
             * Step-by-step:
             *   const encoder = new TextEncoder();
             *   const data = encoder.encode("mypassword");
             *   // data is Uint8Array: [109, 121, 112, 97, 115, ...]
             *
             *   const hashBuffer = await crypto.subtle.digest('SHA-256', data);
             *   // hashBuffer is ArrayBuffer (32 bytes / 256 bits)
             *
             *   const hashArray = Array.from(new Uint8Array(hashBuffer));
             *   // Convert to regular array: [91, 234, 12, ...]
             *
             *   const hex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
             *   // "5bea0c..." — 64 character hex string
             */
            async function hashPassword(password) {
                const encoder = new TextEncoder();
                const data = encoder.encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            /** Generate a cryptographically secure random 64-char hex token */
            function generateToken() {
                const arr = new Uint8Array(32);
                crypto.getRandomValues(arr);
                return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async function createAdmin(username, password, role = 'Admin') {
                const hash = await hashPassword(password);
                await DB.execute("INSERT INTO admin (username, password_hash, role, created_at, updated_at) VALUES (?, ?, ?, datetime('now'), datetime('now'))",
                    [username, hash, role], true);
            }

            async function login(username, password) {
                const hash = await hashPassword(password);
                const r = await DB.execute(
                    'SELECT id, username, role FROM admin WHERE username = ? AND password_hash = ?',
                    [username, hash]);
                if (!r.rows.length) throw new Error('Invalid username or password');
                createSession(r.rows[0]);
                return r.rows[0];
            }

            function createSession(user) {
                const session = { user: { id: user.id, username: user.username, role: user.role }, expiresAt: Date.now() + DURATION };
                localStorage.setItem(SESSION_KEY, JSON.stringify(session));
                currentUser = session.user;
            }

            function loadSession() {
                try {
                    const s = JSON.parse(localStorage.getItem(SESSION_KEY));
                    if (!s || Date.now() > s.expiresAt) { logout(); return null; }
                    currentUser = s.user;
                    return s.user;
                } catch { logout(); return null; }
            }

            function logout() {
                localStorage.removeItem(SESSION_KEY);
                currentUser = null;
            }

            function isAuthenticated() { loadSession(); return !!currentUser; }
            function getUser() { loadSession(); return currentUser; }
            function hasRole(roles) { return currentUser && roles.includes(currentUser.role); }

            async function getUsers() { return DB.execute('SELECT id, username, role, reset_token, created_at, updated_at FROM admin'); }
            async function updateRole(id, role) { return DB.execute('UPDATE admin SET role = ? WHERE id = ?', [role, id], true); }
            async function deleteUser(id) { return DB.execute('DELETE FROM admin WHERE id = ?', [id], true); }

            async function generateResetToken(username) {
                const token = generateToken();
                const r = await DB.execute('UPDATE admin SET reset_token = ? WHERE username = ?', [token, username], true);
                if (r.affected === 0) throw new Error('User not found');
                return token;
            }

            async function resetPassword(token, newPass) {
                const hash = await hashPassword(newPass);
                const r = await DB.execute('UPDATE admin SET password_hash = ?, reset_token = NULL WHERE reset_token = ?', [hash, token], true);
                if (r.affected === 0) throw new Error('Invalid or expired reset token');
            }

            async function changePassword(userId, oldPass, newPass) {
                const oldH = await hashPassword(oldPass);
                const c = await DB.execute('SELECT id FROM admin WHERE id = ? AND password_hash = ?', [userId, oldH]);
                if (!c.rows.length) throw new Error('Current password is incorrect');
                const newH = await hashPassword(newPass);
                await DB.execute('UPDATE admin SET password_hash = ? WHERE id = ?', [newH, userId], true);
            }

            async function adminExists() {
                try {
                    const r = await DB.execute('SELECT COUNT(*) as count FROM admin');
                    return r.rows[0]?.count > 0;
                } catch { return false; }
            }

            loadSession();
            return {
                hashPassword, createAdmin, login, logout, isAuthenticated, getUser, hasRole,
                getUsers, updateRole, deleteUser, generateResetToken, resetPassword,
                changePassword, adminExists, loadSession
            };
        })();

        // ==========================================
        // MODULE 4: Router — Hash-Based SPA Router
        // ==========================================
        const Router = (() => {
            const routes = [];
            let notFoundFn = null;

            /**
             * Register a route with a pattern and handler.
             * Patterns support dynamic segments: 'post/:slug', 'admin/edit/:id'
             */
            function on(pattern, handler, opts = {}) {
                routes.push({ pattern, handler, opts });
            }

            function notFound(fn) { notFoundFn = fn; }

            function navigate(path) { window.location.hash = '#' + path; }

            /**
             * Match a pattern against the current hash.
             * Splits both by '/' and compares segment by segment.
             * Dynamic segments (starting with ':') become named params.
             * Returns null if no match, or an object of params if matched.
             */
            function matchRoute(pattern, hash) {
                const pp = pattern.split('/'), hp = hash.split('/');
                if (pp.length !== hp.length) return null;
                const params = {};
                for (let i = 0; i < pp.length; i++) {
                    if (pp[i].startsWith(':')) params[pp[i].slice(1)] = decodeURIComponent(hp[i]);
                    else if (pp[i] !== hp[i]) return null;
                }
                return params;
            }

            function resolve() {
                const hash = window.location.hash.slice(1) || 'home';
                // Scroll to top on route change
                window.scrollTo({ top: 0, behavior: 'instant' });
                for (const r of routes) {
                    const params = matchRoute(r.pattern, hash);
                    if (params !== null) {
                        // Auth guard: if route requires auth, check before calling handler
                        if (r.opts.auth && !Auth.isAuthenticated()) {
                            navigate('login');
                            return;
                        }
                        if (r.opts.roles && !Auth.hasRole(r.opts.roles)) {
                            UI.showToast('Insufficient permissions', 'error');
                            navigate('admin/dashboard');
                            return;
                        }
                        r.handler(params);
                        // Update nav active state after route change
                        if (typeof UI !== 'undefined' && UI.updateNav) {
                            UI.updateNav();
                        }
                        // Refresh AOS animations for new content
                        if (typeof AOS !== 'undefined') {
                            setTimeout(() => {
                                AOS.refresh();
                                // Also trigger a scroll event to force AOS to check visibility
                                window.dispatchEvent(new Event('scroll'));
                            }, 150);
                        }
                        return;
                    }
                }
                if (notFoundFn) notFoundFn();
            }

            window.addEventListener('hashchange', resolve);

            return { on, notFound, navigate, resolve };
        })();

                let isoStr = dateStr;

                    isoStr = dateStr.replace(' ', 'T');

                const d = new Date(isoStr);

            function renderPostPage(post, prevPost, nextPost) {
                const prevLink = prevPost

                    : '<span></span>';
                const nextLink = nextPost
                    ? `<a href="#post/${nextPost.slug}" style="margin-left:auto;text-align:right;flex-direction:row-reverse"><span class="post-nav-title">${escapeHtml(nextPost.title)}</span>${Icons.arrowRight}</a>`

                const coverImage = post.cover_image || 'assets/img/fallback-image.png';

                app.innerHTML = `
                <article class="post-view page-enter" style="padding:0">
                    <div class="post-hero-bg" style="background-image: url('${coverImage}')">
                        <div class="post-hero-bg-overlay"></div>
                        <div class="post-hero-bg-content">
                            <a href="#home" class="post-back-link-bg">${Icons.arrowLeft} Back to Home</a>
                            <span class="badge badge-${categoryClass(post.category)}">${escapeHtml(post.category)}</span>
