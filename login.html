<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Sagar's Blogs</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- ========== NAVBAR ========== -->
    <nav class="navbar" id="navbar">
        <div class="nav-inner">
            <a href="index.html#home" class="nav-brand">
                <img src="assets/img/sagarmalla.gif" alt="Sagar's Blogs" class="brand-logo">
                <span>Sagar's Blogs</span>
            </a>
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="nav-links" id="nav-links">
                <a href="index.html#home" id="nav-home">Home</a>
                <a href="about.html" id="nav-about">About</a>
                <a href="contact.html" id="nav-contact">Contact</a>
                <a href="index.html#admin/dashboard" id="nav-admin" class="hidden">Dashboard</a>
                <a href="login.html" id="nav-login" class="active">Login</a>
                <button id="nav-logout" class="hidden" onclick="UI_UTILS.handleLogout()">Logout</button>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
            </div>
        </div>
    </nav>

    <main id="app">
        <div class="auth-page page-enter">
            <div class="form-card">
                <h2>Welcome Back</h2>
                <p class="form-subtitle">Login to manage your blog posts and settings.</p>
                <form id="login-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input class="form-input" type="text" id="login-user" required placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-input-wrap">
                            <input class="form-input" type="password" id="login-pass" required placeholder="Enter password">
                            <button type="button" class="password-toggle" id="toggle-pass" title="Toggle visibility"></button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-full" id="login-btn">Login to Dashboard</button>
                </form>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Sagar's Blogs. by <a href="https://sagarmalla.info.np" target="_blank" rel="noopener">Sagar Malla</a></p>
        </div>
    </footer>

    <script src="config.local.js"></script>
    <script src="assets/js/core.js"></script>
    <script>
        // Specific Logic for Login Page
        document.addEventListener('DOMContentLoaded', () => {
            const themeBtn = document.getElementById('theme-toggle');
            const updateThemeIcon = (theme) => {
                themeBtn.innerHTML = theme === 'light' ? Icons.sun || 'Sun' : Icons.moon || 'Moon';
                // Simple Fallback icons
                themeBtn.innerHTML = theme === 'light' ? 
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></svg>' :
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
            };
            
            updateThemeIcon(UI_UTILS.setupTheme());
            UI_UTILS.updateNav();
            themeBtn.addEventListener('click', () => updateThemeIcon(UI_UTILS.toggleTheme()));

            // Password Toggle
            const toggleBtn = document.getElementById('toggle-pass');
            const passInput = document.getElementById('login-pass');
            toggleBtn.innerHTML = Icons.eye;
            toggleBtn.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                toggleBtn.innerHTML = isPass ? Icons.eyeOff : Icons.eye;
            });

            // Login Submit
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const user = document.getElementById('login-user').value;
                const pass = document.getElementById('login-pass').value;
                const btn = document.getElementById('login-btn');
                
                btn.disabled = true;
                btn.textContent = 'Authenticating...';
                
                try {
                    await Auth.login(user, pass);
                    UI_UTILS.showToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'index.html#admin/dashboard', 1000);
                } catch (err) {
                    UI_UTILS.showToast(err.message, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Login to Dashboard';
                }
            });

            // Mobile Menu
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('nav-links').classList.toggle('open');
            });
        });
    </script>
</body>
</html>
