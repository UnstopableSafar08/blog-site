name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into assets/js/core.js
        run: |
          # Use | as delimiter in sed to avoid issues with URL slashes
          sed -i "s|__TURSO_DB_URL__|${{ secrets.TURSO_DB_URL }}|g" assets/js/core.js
          sed -i "s|__TURSO_READ_TOKEN__|${{ secrets.TURSO_READ_TOKEN }}|g" assets/js/core.js
          sed -i "s|__TURSO_FULL_TOKEN__|${{ secrets.TURSO_FULL_TOKEN }}|g" assets/js/core.js
          sed -i "s|__EMAILJS_PUBLIC_KEY__|${{ secrets.EMAILJS_PUBLIC_KEY }}|g" assets/js/core.js
          sed -i "s|__EMAILJS_SERVICE_ID__|${{ secrets.EMAILJS_SERVICE_ID }}|g" assets/js/core.js
          sed -i "s|__EMAILJS_TEMPLATE_ID__|${{ secrets.EMAILJS_TEMPLATE_ID }}|g" assets/js/core.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Match the root of your project
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
